storage:
  default:
    backend:
      type: memory

server:
  protocol: https
  https_port: 8080
  cert_file: /certs/server.crt
  cert_key: /certs/server.key

authentication:
  required: true
  methods:
    token:
      enabled: true
      storage:
        tokens:
          test-token:
            credential: test-secret
